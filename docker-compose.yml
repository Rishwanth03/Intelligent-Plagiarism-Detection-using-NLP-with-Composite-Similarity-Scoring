services:
  backend:
    build:
      context: ./backend
    container_name: plagiarism-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_DEBUG=false

  frontend:
    build:
      context: ./frontend
    container_name: plagiarism-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
